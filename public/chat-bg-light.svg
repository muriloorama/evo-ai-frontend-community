<?xml version="1.0" encoding="UTF-8"?>
<!--
  WhatsApp-inspired doodle background — light theme.
  Larger 320x320 tile with denser doodles and lower opacity for a softer feel.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <rect width="320" height="320" fill="#EFEAE2"/>
  <g fill="none" stroke="#D8CFC1" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.32">
    <!-- speech bubble TL -->
    <path d="M22 32 q0 -10 10 -10 h28 q10 0 10 10 v12 q0 10 -10 10 h-18 l-9 7 v-7 q-11 0 -11 -10 z"/>
    <!-- heart TR -->
    <path d="M260 38 q-7 -9 -14 0 q-7 -9 -14 0 q0 9 14 19 q14 -10 14 -19 z"/>
    <!-- smile mid-left -->
    <circle cx="58" cy="148" r="13"/>
    <path d="M52 148 q6 6 12 0"/>
    <circle cx="54" cy="144" r="0.8" fill="#D8CFC1" stroke="none"/>
    <circle cx="62" cy="144" r="0.8" fill="#D8CFC1" stroke="none"/>
    <!-- camera mid-right -->
    <path d="M236 156 h30 q4 0 4 4 v20 q0 4 -4 4 h-30 q-4 0 -4 -4 v-20 q0 -4 4 -4 z"/>
    <circle cx="251" cy="172" r="6"/>
    <path d="M247 156 l4 -4 h6 l4 4"/>
    <!-- music note bottom-left -->
    <path d="M118 224 v-28 l16 -4 v22"/>
    <ellipse cx="116" cy="226" rx="5" ry="3.5"/>
    <ellipse cx="134" cy="214" rx="5" ry="3.5"/>
    <!-- airplane top-mid -->
    <path d="M148 80 l28 -10 l-7 14 l-21 -4 z"/>
    <path d="M169 84 l7 -14 l-2 22 z"/>
    <!-- gift box bottom-right -->
    <rect x="222" y="232" width="34" height="28" rx="2"/>
    <path d="M222 244 h34"/>
    <path d="M239 232 v28"/>
    <path d="M232 232 q-4 -8 7 -6 q11 -2 7 6"/>
    <!-- coffee cup top -->
    <path d="M208 14 h22 l-2 22 q-1 8 -9 8 t-9 -8 z"/>
    <path d="M230 22 q8 0 8 8 q0 7 -8 7"/>
    <!-- thumbs up bottom-mid -->
    <path d="M180 264 v-12 q0 -4 4 -6 q4 -2 4 -8 q0 -4 4 -4 q4 0 4 4 v6 h12 q4 0 4 4 v12 q0 4 -4 4 h-24 q-4 0 -4 -0 z"/>
    <!-- flower mid -->
    <circle cx="140" cy="160" r="3"/>
    <circle cx="140" cy="151" r="4"/>
    <circle cx="140" cy="169" r="4"/>
    <circle cx="131" cy="160" r="4"/>
    <circle cx="149" cy="160" r="4"/>
    <!-- envelope right mid -->
    <rect x="20" y="248" width="32" height="22" rx="2"/>
    <path d="M20 250 l16 12 l16 -12"/>
    <!-- star top right small -->
    <path d="M298 96 l3 6 l7 1 l-5 5 l1 7 l-6 -3 l-6 3 l1 -7 l-5 -5 l7 -1 z"/>
    <!-- ticks bottom-left -->
    <path d="M50 296 l4 4 l8 -8"/>
    <path d="M58 296 l4 4 l8 -8"/>
    <!-- dots scattered -->
    <circle cx="98" cy="50" r="1.4" fill="#D8CFC1" stroke="none"/>
    <circle cx="106" cy="54" r="1.4" fill="#D8CFC1" stroke="none"/>
    <circle cx="114" cy="50" r="1.4" fill="#D8CFC1" stroke="none"/>
    <circle cx="284" cy="118" r="1.4" fill="#D8CFC1" stroke="none"/>
    <circle cx="292" cy="122" r="1.4" fill="#D8CFC1" stroke="none"/>
    <circle cx="300" cy="118" r="1.4" fill="#D8CFC1" stroke="none"/>
    <circle cx="74" cy="206" r="1.4" fill="#D8CFC1" stroke="none"/>
    <circle cx="82" cy="210" r="1.4" fill="#D8CFC1" stroke="none"/>
    <circle cx="90" cy="206" r="1.4" fill="#D8CFC1" stroke="none"/>
    <!-- balloon -->
    <ellipse cx="44" cy="100" rx="9" ry="11"/>
    <path d="M44 111 l-2 14"/>
    <!-- musical note 2 -->
    <path d="M268 248 v-22 l10 -3 v18"/>
    <ellipse cx="266" cy="250" rx="4" ry="3"/>
    <ellipse cx="278" cy="244" rx="4" ry="3"/>
  </g>
</svg>
